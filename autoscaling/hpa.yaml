---
# Horizontal Pod Autoscaler
# Automatically scales pods based on CPU and memory usage
# Requires metrics-server to be installed on the cluster
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: demo-app-hpa
  namespace: demo-project
  annotations:
    description: "HPA for demo-app - scales between 3 and 10 replicas based on CPU/memory"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: demo-app
  minReplicas: 3            # Never scale below 3 for HA
  maxReplicas: 10           # Never scale above 10
  metrics:
    # Scale up when average CPU exceeds 70%
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # Scale up when average memory exceeds 80%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60    # Wait 60s before scaling up again
      policies:
        - type: Pods
          value: 2                      # Add max 2 pods at a time
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300   # Wait 5 mins before scaling down
      policies:
        - type: Pods
          value: 1                      # Remove max 1 pod at a time
          periodSeconds: 60
